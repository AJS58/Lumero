<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lumero Reset</title><style>body{background:#050914;color:#fff;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:28px}button{background:#15a7ff;color:#fff;border:0;border-radius:14px;padding:14px 18px;font-weight:700}</style></head>
<body><h1>Lumero cache reset</h1><p>This clears older cached prototype versions.</p><button onclick="reset()">Clear cache and open Lumero v0.6</button>
<script>
async function reset(){
 if('serviceWorker' in navigator){ const regs=await navigator.serviceWorker.getRegistrations(); for(const r of regs){await r.unregister();}}
 if('caches' in window){ const keys=await caches.keys(); for(const k of keys){await caches.delete(k);}}
 location.href='index.html?v=0.6';
}
</script></body></html>
