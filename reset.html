<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lumero Reset</title><style>body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#061322;color:#fff;padding:30px}button,a{background:#1678ff;color:#fff;padding:14px 18px;border-radius:14px;border:0;text-decoration:none;font-weight:800;display:inline-block;margin-top:18px}.box{max-width:520px;margin:0 auto;background:#0b1c31;border:1px solid #24466f;border-radius:24px;padding:24px}</style></head><body><div class="box"><h1>Lumero Cache Reset</h1><p>This clears the old Lumero prototype cache and service worker so the newest version loads.</p><button id="reset">Clear old version</button><p id="status"></p><a href="index.html?v=0.3.1">Open Lumero v0.3.1</a></div><script>async function clearAll(){document.getElementById('status').textContent='Clearing…'; if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister()));} if('caches' in window){const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k)));} localStorage.setItem('lumero_cache_reset','0.3.1'); document.getElementById('status').textContent='Done. Now tap Open Lumero v0.3.1.';} document.getElementById('reset').onclick=clearAll; clearAll();</script></body></html>
